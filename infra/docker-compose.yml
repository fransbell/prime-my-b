version: "3.9"

services:
  # PocketBase Server (Go library mode)
  pocketbase:
    build:
      context: ../server
      dockerfile: ../infra/Dockerfile.server
    container_name: prime-my-brain-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/app/pb_data
      - pb_public:/app/pb_public
    environment:
      - PB_DATA_DIR=/app/pb_data
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@example.com}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-changeme123}
      - PB_AUTO_MIGRATE=true
      - LINE_CLIENT_ID=${LINE_CLIENT_ID:-}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Dashboard App (Analytics / Data Visualization)
  dashboard:
    build:
      context: ../client
      dockerfile: ../infra/Dockerfile.client
      args:
        - APP_NAME=dashboard
    container_name: prime-my-brain-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      - VITE_PB_URL=http://pocketbase:8090

  # LIFF App (LINE Front-end Framework)
  liff-app:
    build:
      context: ../client
      dockerfile: ../infra/Dockerfile.client
      args:
        - APP_NAME=liff-app
    container_name: prime-my-brain-liff
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      - VITE_PB_URL=http://pocketbase:8090
      - VITE_LIFF_ID=${LIFF_ID:-}
      - VITE_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - VITE_LIFF_REDIRECT_URI=${LIFF_REDIRECT_URI:-}

  # IoT Demo App (Data Generation/Insert)
  iot-demo:
    build:
      context: ../client
      dockerfile: ../infra/Dockerfile.client
      args:
        - APP_NAME=iot-demo
    container_name: prime-my-brain-iot-demo
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      - VITE_PB_URL=http://pocketbase:8090

volumes:
  pb_data:
    driver: local
  pb_public:
    driver: local
